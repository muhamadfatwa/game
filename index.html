<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flamingo Love Journey</title>
    <style>
        body { 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #ffe5ec; 
            margin: 0; 
            overflow: hidden; 
            touch-action: manipulation;
        }
        #game-container { position: relative; width: 100%; max-width: 800px; margin: auto; }
        canvas { 
            background: #fff; 
            display: block; 
            margin: 20px auto; 
            border-radius: 10px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-bottom: 5px solid #ffb3c1;
            max-width: 95%;
        }
        #ui { margin-top: 20px; color: #ff4d6d; }
        
        #overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            color: white; 
            z-index: 10;
            padding-top: 50px;
        }
        video { 
            border: 5px solid #ff4d6d; 
            border-radius: 15px; 
            max-width: 80%; 
            height: auto; 
        }
        .msg { font-size: 1.1rem; margin: 20px; line-height: 1.5; padding: 0 20px; }
        .btn { 
            padding: 15px 30px; 
            background: #ff4d6d; 
            color: white; 
            border: none; 
            border-radius: 50px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
        }
    </style>
</head>
<body>

    <audio id="bgm" loop preload="auto">
        <source src="musik_ceria.mp3" type="audio/mpeg">
    </audio>

    <div id="ui">
        <h1>💖 Flamingo Run 💖</h1>
        <h3>Player: Indah</h3>
        <h3>Level: <span id="lvl">1</span> | Score: <span id="scr">0</span></h3>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="overlay">
        <video id="finish-video" loop playsinline muted> 
            <source id="video-source" src="" type="video/mp4">
        </video>
        <div class="msg" id="message-text"></div>
        
        <button id="next-btn" class="btn" onclick="nextLevel()">Lanjut!</button>
        
        <div id="wa-section" style="display:none; margin-top: 30px;">
            <button class="btn" onclick="sendWA()" style="position: relative; z-index: 10;">MAUUU! ❤️</button>
            <button id="btn-tidak" class="btn" 
                    style="background: #bdc3c7; position: fixed; transition: all 0.1s ease; z-index: 99; left: 60%; top: 70%;">
                    Enggak
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const bgm = document.getElementById("bgm");
        canvas.width = 800;
        canvas.height = 250;

        let level = 1;
        let score = 0;
        let isPlaying = true;
        let speed = 6;
        let animationFrame;
        let musicStarted = false;

        // Assets Loader
        let assetsLoaded = 0;
        const flamingoImg = new Image();
        flamingoImg.src = 'flamingo.png';
        flamingoImg.onload = assetLoaded;

        const kaktusImg = new Image();
        kaktusImg.src = 'kaktus.png';
        kaktusImg.onload = assetLoaded;

        function assetLoaded() {
            assetsLoaded++;
            if (assetsLoaded === 2) {
                update(); 
            }
        }

        let flamingo = { x: 50, y: 190, w: 50, h: 50, dy: 0, jump: 12, grounded: false };
        let obstacles = [];

        function spawnObstacle() {
            let height = 40 + Math.random() * 30;
            obstacles.push({ x: canvas.width, y: 240 - height, w: 25, h: height });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#ffb3c1";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, 240);
            ctx.lineTo(canvas.width, 240);
            ctx.stroke();

            if (flamingoImg.complete) {
                ctx.drawImage(flamingoImg, flamingo.x, flamingo.y, flamingo.w, flamingo.h);
            }
            if (kaktusImg.complete) {
                obstacles.forEach(obs => {
                    ctx.drawImage(kaktusImg, obs.x, obs.y, obs.w, obs.h);
                });
            }
        }

        function update() {
            if (!isPlaying) return;

            if (!flamingo.grounded) {
                flamingo.dy += 0.7;
                flamingo.y += flamingo.dy;
            }

            if (flamingo.y > 190) {
                flamingo.y = 190;
                flamingo.dy = 0;
                flamingo.grounded = true;
            }

            obstacles.forEach((obs, i) => {
                obs.x -= speed;
                let padding = 5;
                if (flamingo.x + padding < obs.x + obs.w - padding && 
                    flamingo.x + flamingo.w - padding > obs.x + padding && 
                    flamingo.y + padding < obs.y + obs.h - padding && 
                    flamingo.y + flamingo.h - padding > obs.y + padding) {
                    resetLevel();
                }

                if (obs.x + obs.w < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    document.getElementById("scr").innerText = score;
                    checkLevel();
                }
            });

            if (Math.random() < 0.015) spawnObstacle();
            draw();
            animationFrame = requestAnimationFrame(update);
        }

        function checkLevel() {
            if (score === 7 && level === 1) showOverlay("Loncatin kaktus aja kamu jago, apalagi loncatin masa lalu buat ke masa depan bareng aku!!", "video1.mp4");
            else if (score === 16 && level === 2) showOverlay("Rintangan game ini makin cepet, tapi rasa sayangku jalannya jauh lebih cepet lagi. Siap buat rintangan terakhir?", "video2.mp4");
            else if (score === 26 && level === 3) showOverlay("Game Over! Tapi tenang, yang berakhir cuma gamenya. Daripada jago mainin flamingo, mending jago jadi pacar aku.❤️", "video3.mp4", true);
        }

        function showOverlay(msg, videoSrc, isFinal = false) {
            isPlaying = false;
            cancelAnimationFrame(animationFrame);
            bgm.volume = 0.2; // Kecilkan musik saat video/pesan muncul

            const overlay = document.getElementById("overlay");
            const video = document.getElementById("finish-video");
            const source = document.getElementById("video-source");
            source.src = videoSrc;
            video.load();
            video.play();
            
            document.getElementById("message-text").innerText = msg;
            overlay.style.display = "block";

            if (isFinal) {
                document.getElementById("next-btn").style.display = "none";
                document.getElementById("wa-section").style.display = "block";
                aktifkanTombolLari();
            }
        }

        function nextLevel() {
            level++;
            document.getElementById("lvl").innerText = level;
            speed += 2; 
            bgm.volume = 1.0; // Keraskan musik lagi
            document.getElementById("overlay").style.display = "none";
            document.getElementById("finish-video").pause();
            isPlaying = true;
            obstacles = []; 
            update();
        }

        function resetLevel() {
            if(level === 1) score = 0;
            else if(level === 2) score = 8;
            else if(level === 3) score = 17;
            document.getElementById("scr").innerText = score;
            obstacles = [];
        }

        // --- KONTROL & MUSIK ---
        function lompat() {
            // Memulai musik pada interaksi pertama
            if (!musicStarted) {
                bgm.play().catch(e => console.log("Audio diblokir"));
                musicStarted = true;
            }

            if (isPlaying && flamingo.grounded) {
                flamingo.dy = -flamingo.jump;
                flamingo.grounded = false;
            }
        }

        // Kontrol Spasi (Laptop)
        window.addEventListener("keydown", (e) => {
            if (e.code === "Space") {
                e.preventDefault(); // Mencegah halaman scroll ke bawah saat tekan spasi
                lompat();
            }
        });

        // Kontrol Tap (HP)
        window.addEventListener("touchstart", (e) => {
            if (e.target.tagName !== 'BUTTON') {
                lompat();
            }
        }, { passive: false });

        // --- LOGIKA TOMBOL LARI ---
        function pindahPosisi() {
            const btn = document.getElementById('btn-tidak');
            const maxX = window.innerWidth - btn.offsetWidth - 20;
            const maxY = window.innerHeight - btn.offsetHeight - 20;
            btn.style.left = Math.floor(Math.random() * maxX) + 'px';
            btn.style.top = Math.floor(Math.random() * maxY) + 'px';
        }

        function aktifkanTombolLari() {
            const btnTidak = document.getElementById('btn-tidak');
            btnTidak.onmousedown = pindahPosisi;
            btnTidak.ontouchstart = function(e) {
                e.preventDefault();
                pindahPosisi();
            };
        }

        function sendWA() {
            const phone = "6285811139333"; 
            const text = "Iya, aku mauu! ❤️";
            window.location.href = `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;
        }
    </script>
</body>
</html>
